<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNN Face Recognition - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(
        135deg,
        rgba(155, 221, 255, 0.95),
        rgba(155, 221, 255, 0.7)
      );
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-box {
      background: #fff;
      border-radius: 30px;
      width: 90%;
      max-width: 600px;
      padding: 60px 40px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .container-box h1 {
      font-size: 36px;
      font-weight: 800;
      color: #d6336c;
      margin-bottom: 20px;
    }

    .container-box p {
      font-size: 18px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-cnn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 15px 40px;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background-color: #d6336c;
      border: none;
      border-radius: 15px;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(214, 51, 108, 0.3);
    }

    .btn-cnn:hover {
      background-color: #b52a5a;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(214, 51, 108, 0.4);
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background-color: #0077b6;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      transition: all 0.3s ease;
      margin-top: 30px;
    }

    .btn-back:hover {
      background-color: #005f8f;
      transform: translateY(-2px);
    }

    .alert-box {
      margin-top: 20px;
      padding: 15px;
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 10px;
      font-size: 16px;
    }

   

    

    

    
  </style>
</head>

<body>
  <div class="container-box">
    <h1><i class="fas fa-brain"></i> CNN Face Recognition</h1>

    {% if mess %}
    <div class="alert-box">
      <i class="fas fa-exclamation-triangle"></i> {{ mess }}
    </div>
    {% endif %}

    <a href="/cnn_recognize" class="btn-cnn">
      <i class="fas fa-camera"></i> Start Face Recognition with CNN
    </a>

    

    <a href="/" class="btn-back">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </div>
</body>
</html>
