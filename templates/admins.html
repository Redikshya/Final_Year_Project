<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Admins - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(155,221,255,0.9), rgba(155,221,255,0.7));
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      padding-bottom: 20px;
    }

    .image-section {
      width: 100%;
      text-align: center;
      padding: 15px;
      background: #ffffff;
    }

    .image-section img {
      max-width: 40%;
      height: auto;
      border-radius: 0;
    }

    .form-section {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff;
      border-radius: 0;
      padding: 25px;
      margin-top: 10px;
      text-align: center;
    }

    .form-section h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #000;
      font-weight: 600;
    }

    .admin-list {
      text-align: left;
      margin-top: 15px;
    }

    .admin-list p {
      font-size: 16px;
      color: #000;
      border-bottom: 1px solid #ccc;
      padding: 6px 0;
      margin: 0;
    }

    .btn-primary, .back-btn {
      margin-top: 15px;
      font-weight: bold;
    }

    .btn-primary {
      background-color: #000;
      border: none;
      border-radius: 25px;
      width: 100%;
      height: 45px;
      font-size: 16px;
      color: #fff;
    }

    .btn-primary:hover {
      background-color: #333;
    }

    .back-btn {
      display: block;
      text-align: center;
      color: #000;
      text-decoration: none;
      font-weight: 600;
    }

    .back-btn:hover {
      text-decoration: underline;
      color: #555;
    }

    .message {
      color: #000;
      font-weight: 600;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #ffffff;
    }
  </style>
</head>

<body>
  <div class="main-container">
    <!-- Image Section -->
    <div class="image-section">
      <img src="{{ url_for('static', filename='images/eight.jpg') }}" alt="Admins Illustration" />
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <h1>Registered Admins</h1>

      {% if mess %}
        <div class="message">{{ mess }}</div>
      {% endif %}

      {% if admins %}
        <div class="admin-list">
          {% for email in admins %}
            <p>{{ email }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <a href="/dashboard" class="back-btn">Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
