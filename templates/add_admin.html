<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Admin - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(155,221,255,0.9), rgba(155,221,255,0.7));
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 600px;
      background: #ffffff; /* fully white */
      border-radius: 16px;
      overflow: hidden;
      padding-bottom: 20px;
    }

    .image-section {
      width: 100%;
      text-align: center;
      padding: 15px;
      background: #ffffff; /* fully white */
    }

    .image-section img {
      max-width: 40%; /* smaller image */
      height: auto;
      border-radius: 0; /* no shadow/glow */
    }

    .form-section {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff; /* fully white */
      border-radius: 0; /* remove shadow/glow */
      padding: 25px;
      margin-top: 10px;
      text-align: center;
    }

    .form-section h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #000;
      font-weight: 600;
    }

    .form-control {
      border-radius: 6px;
      height: 45px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    .form-control:focus {
      border-color: #000;
      box-shadow: none; /* no glow */
      outline: none;
    }

    .btn-primary, .btn-secondary {
      border-radius: 25px;
      width: 100%;
      height: 45px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-primary {
      background-color: #000;
      border: none;
      color: #fff;
    }

    .btn-primary:hover {
      background-color: #333;
    }

    .btn-secondary {
      background-color: #1c6dd0;
      border: none;
      color: #fff;
    }

    .btn-secondary:hover {
      background-color: #004080;
    }

    .back-btn {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #000;
      text-decoration: none;
      font-weight: 600;
    }

    .back-btn:hover {
      text-decoration: underline;
      color: #555;
    }

    .message {
      color: #000;
      font-weight: 600;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #ffffff; /* match white container */
    }
  </style>
</head>

<body>
  <div class="main-container">
    <!-- Image Section -->
    <div class="image-section">
      <img src="{{ url_for('static', filename='images/eight.jpg') }}" alt="Add Admin Illustration" />
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <h1>Add New Admin</h1>

      {% if mess %}
        <div class="message">{{ mess }}</div>
      {% endif %}

      <form action="/add_admin" method="POST">
        <input type="email" class="form-control" name="email" placeholder="Enter Admin Email" required>
        <button type="submit" class="btn btn-primary">Add Admin</button>
      </form>

      <a href="/dashboard" class="back-btn">Back to Dashboard</a>

      <!-- New View Admins Button -->
      <form action="/view_admins" method="GET">
        <button type="submit" class="btn btn-secondary">View Admins</button>
      </form>

    </div>
  </div>
</body>
</html>
