<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Files - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, rgba(155,221,255,0.9), rgba(155,221,255,0.7));
    }

    .main-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 600px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      padding-bottom: 20px;
    }

    .image-section {
      width: 100%;
      text-align: center;
      padding: 15px;
      background: #ffffff;
    }

    .image-section img {
      max-width: 40%;
      height: auto;
      border-radius: 0;
    }

    .form-section {
      width: 100%;
      max-width: 400px;
      background-color: #ffffff;
      border-radius: 0;
      padding: 25px;
      margin-top: 10px;
      text-align: center;
    }

    .form-section h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #000;
      font-weight: 600;
    }

    .form-control {
      border-radius: 6px;
      height: 45px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      text-align: center;
    }

    .form-control:focus {
      border-color: #000;
      box-shadow: none;
      outline: none;
    }

    .btn-primary, .btn-secondary {
      border-radius: 25px;
      width: 100%;
      height: 45px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn-primary {
      background-color: #000;
      border: none;
      color: #fff;
    }

    .btn-primary:hover {
      background-color: #333;
    }

    .btn-secondary {
      background-color: #1c6dd0;
      border: none;
      color: #fff;
    }

    .btn-secondary:hover {
      background-color: #004080;
    }

    .back-btn {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #000;
      text-decoration: none;
      font-weight: 600;
    }

    .back-btn:hover {
      text-decoration: underline;
      color: #555;
    }

    .message {
      color: #000;
      font-weight: 600;
      margin-top: 15px;
      padding: 10px;
      border-radius: 10px;
      background: #ffffff;
    }

    .file-list {
      text-align: left;
      margin-top: 20px;
      padding-left: 0;
      list-style: none;
    }

    .file-list li {
      margin-bottom: 10px;
    }

    .file-list a {
      text-decoration: none;
      color: #1c6dd0;
      font-weight: 500;
    }

    .file-list a:hover {
      text-decoration: underline;
      color: #004080;
    }

    .image-section img {
    max-width: 60%; /* increased from 40% */
    height: auto;
    border-radius: 0;
    }
  </style>
</head>

<body>
  <div class="main-container">
    <!-- Image Section -->
    <div class="image-section">
      <img src="{{ url_for('static', filename='images/ten.jpg') }}" alt="Files Illustration" />
    </div>

    <!-- Form Section -->
    <div class="form-section">
      <h1>Search Files</h1>

      {% if message %}
        <div class="message">{{ message }}</div>
      {% endif %}

      <form method="POST">
        <input type="text" class="form-control" name="search" placeholder="Enter file name..." required>
        <button type="submit" class="btn btn-primary">Search</button>
      </form>

      {% if files %}
        <ul class="file-list">
          {% for file in files %}
            <li>
              <a href="{{ url_for('static', filename=file.file_path.split('static/')[1]) }}" target="_blank">
                {{ file.file_name }}
              </a>
            </li>
          {% endfor %}
        </ul>
      {% endif %}

      <a href="{{ url_for('home') }}" class="back-btn">Back to Home</a>
    </div>
  </div>
</body>
</html>
