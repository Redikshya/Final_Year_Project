<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(
        135deg,
        rgba(155, 221, 255, 0.95),
        rgba(155, 221, 255, 0.7)
      );
      backdrop-filter: blur(6px);
      overflow-x: hidden;
    }

    /* ------------------ TOP NAV BAR ------------------ */
    .top-bar {
      width: 100%;
      height: 70px;
      background: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: fixed;
      top: 0;
      z-index: 100;
    }

    .top-bar .logo {
      font-size: 28px;
      font-weight: 700;
      color: #000;
    }

    .top-bar .nav-buttons a {
      margin-left: 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      font-weight: 600;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s ease;
    }

    .top-bar .nav-buttons a.cnn-button {
      background-color: #d6336c;
    }

    .top-bar .nav-buttons a.cnn-button:hover {
      background-color: #b52a5a;
    }

    .top-bar .nav-buttons a.door-access {
      background-color: #0077b6;
    }

    .top-bar .nav-buttons a.door-access:hover {
      background-color: #005f8f;
    }

    .top-bar .nav-buttons a.admin {
      background-color: #000;
    }

    .top-bar .nav-buttons a.admin:hover {
      background-color: #333;
    }

    /* ------------------ CENTER CONTENT ------------------ */
    .content-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff; /* solid white */
      border-radius: 30px;
      width: 90%;
      max-width: 1000px;
      height: 500px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      overflow: hidden;
    }

    .content-box .left-image {
      flex: 1;
      background: url('static/images/home.png') center center / cover no-repeat;
    }

    .content-box .right-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
    }

    .right-text h1 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #d6336c; /* attractive color */
    }

    .right-text p {
      font-size: 22px;
      color: #0077b6; /* subtopic color */
      font-weight: 500;
      line-height: 1.5;
    }

    /* ------------------ MOBILE RESPONSIVE ------------------ */
    @media (max-width: 768px) {
      .content-box {
        flex-direction: column;
        height: auto;
      }
      .content-box .left-image {
        height: 250px;
      }
      .content-box .right-text {
        padding: 20px;
        text-align: center;
      }
      .top-bar .nav-buttons a {
        margin-left: 5px;
        padding: 8px 15px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo">Lockify</div>
    <div class="nav-buttons">
      <a href="/cnn_try" class="cnn-button"><i class="fas fa-brain"></i> CNN</a>
      <a href="/access" class="door-access"><i class="fas fa-door-open"></i> Initiate Access</a>
      <a href="/login" class="admin"><i class="fas fa-user-shield"></i> Admin</a>
      <a href="/about" class="admin"><i class="fas fa-info-circle"></i> About</a>
    </div>
  </div>

  <!-- Center Content -->
  <div class="content-box">
    <!-- Left Image -->
    <div class="left-image"></div>

    <!-- Right Text -->
    <div class="right-text">
      <h1>Redefining Security with Intelligence</h1>
      <p>Access Made Smarter, Safer, and Simple</p>
    </div>
  </div>
</body>
</html>
