<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registered Users - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ---------------- BACKGROUND ---------------- */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, rgba(155, 221, 255, 0.95), rgba(155, 221, 255, 0.75));
      backdrop-filter: blur(8px);
      overflow-y: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 120px; /* space for back button */
    }

    /* ---------------- BACK BUTTON ---------------- */
    .btn-back {
      position: fixed;
      top: 25px;
      right: 25px;
      padding: 12px 25px;
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      background-color: #005f8f;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .btn-back:hover {
      background-color: #005f8f;
      color: #ffffff;
      transform: scale(1.05);
    }

    /* ---------------- MAIN CONTAINER ---------------- */
    .main-container {
      width: 90%;
      max-width: 1100px;
      margin-bottom: 60px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px 50px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    .text-link {
      color: #000;
      text-decoration: none;
    }

    .text-link:hover {
      color: #1a4fc5;
      text-decoration: none;
    }

    h2 {
      font-size: 32px;
      font-weight: bold;
      background-color: rgba(255, 255, 255, 0.6);
      color: #1F0060;
      padding: 18px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 25px;
    }

    /* ---------------- TABLE STYLING ---------------- */
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    th,
    td {
      padding: 12px;
      text-align: center;
      font-size: 18px;
      color: #000;
    }

    th {
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.4);
    }

    tr:nth-child(odd) {
      background-color: rgba(255, 255, 255, 0.2);
    }

    /* ---------------- BUTTONS INSIDE TABLE ---------------- */
    .btn-remove {
      padding: 4px 12px;
      border: none;
      border-radius: 6px;
      background-color: #336699;
      color: #fff;
      margin: 4px 0;
      transition: 0.3s;
      cursor: pointer;
    }

    .btn-remove:hover {
      background-color: #1f4a7a;
      transform: scale(1.05);
    }

    /* ---------------- RESPONSIVE ---------------- */
    @media (max-width: 768px) {
      .main-container {
        width: 95%;
        padding: 25px;
      }

      table {
        font-size: 14px;
      }

      h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <!-- Back Button -->
  <a href="{{ url_for('dashboard') }}" class="btn-back">Go to Dashboard</a>

  <div class="main-container">

    <h2>Registered Users</h2>

    {% if mess %}
    <h5 style="color: #1F0060; font-size: 20px; margin-top: 20px; text-align:center;">{{ mess }}</h5>
    {% endif %}

    {% if l >= 1 %}
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Name</th>
            <th>ID</th>
            <th>Department</th> <!-- NEW -->
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for i in range(l) %}
          <tr>
            <td>{{ i+1 }}</td>
            <td>{{ names[i] }}</td>
            <td>{{ rolls[i] }}</td>
            <td>{{ departments[i] }}</td> <!-- NEW -->
            <td>
              <form style="display:inline-block;" action='/deleteregistereduser' method="POST">
                <input type="hidden" name="index" value="{{ i }}">
                <input type="submit" value="Remove" class="btn-remove">
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

    </div>
    {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
