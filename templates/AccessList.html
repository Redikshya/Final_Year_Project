<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

  <style>
    /* ---------------- BACKGROUND ---------------- */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, rgba(155, 221, 255, 0.95), rgba(155, 221, 255, 0.75));
      backdrop-filter: blur(8px);
      overflow-y: auto;
    }

    /* ---------------- BACK BUTTON ---------------- */
    .btn-back {
      position: fixed;
      top: 25px;
      right: 25px;
      padding: 12px 25px;
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      background-color: #005f8f;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }

    .btn-back:hover {
      background-color: #005f8f;
      color: #ffffff;
      transform: scale(1.05);
    }

    /* ---------------- MAIN CONTAINER ---------------- */
    .main-container {
      width: 90%;
      max-width: 1100px;
      margin: 120px auto 60px auto;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 40px 50px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    

    .text-link {
      color: #000;
      text-decoration: none;
      transition: 0.3s;
    }

    .text-link:hover {
      color: #1a4fc5;
      text-decoration: none;
    }

    h2 {
      font-size: 32px;
      font-weight: bold;
      background-color: rgba(255, 255, 255, 0.6);
      color: #1F0060;
      padding: 18px;
      border-radius: 16px;
      text-align: center;
      margin-bottom: 25px;
    }

    /* ---------------- FORM STYLING ---------------- */
    form {
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      font-size: 20px;
      color: #000;
      margin-right: 10px;
      font-weight: 500;
    }

    .form-control-single {
      font-size: 20px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #aaa;
      min-width: 220px;
      text-align: center;
    }

    .btn-search {
      background-color: #000 !important;
      font-size: 20px;
      padding: 10px 25px;
      border-radius: 12px;
      border: none;
      color: #fff;
      margin-top: 15px;
      transition: 0.3s ease;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .btn-search:hover {
      background-color: #333 !important;
      transform: scale(1.05);
    }

    /* ---------------- TABLE STYLING ---------------- */
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(6px);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    th,
    td {
      padding: 12px;
      text-align: center;
      font-size: 18px;
      color: #000;
    }

    th {
      background-color: rgba(0, 0, 0, 0.8);
      color: #fff;
    }

    tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.4);
    }

    tr:nth-child(odd) {
      background-color: rgba(255, 255, 255, 0.2);
    }

    /* ---------------- MESSAGE ---------------- */
    h5 {
      color: #000;
      font-weight: 500;
      margin-top: 25px;
    }

    /* ---------------- RESPONSIVE ---------------- */
    @media (max-width: 768px) {
      .main-container {
        width: 95%;
        padding: 25px;
      }

      table {
        font-size: 14px;
      }

      h2 {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <!-- Back button -->
  <a href="{{ url_for('dashboard') }}" class="btn-back">Go to Dashboard</a>

  <!-- Main Content -->
  <div class="main-container">
    

    <h2>Access List</h2>

    <!-- Single Date Search Form -->
<form action='/accesslistdate' method="POST" enctype="multipart/form-data" style="display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap;">
  <label for="date">Select Date:</label>
  <input type="date" id="date" name="date" required class="form-control-single">
  <button type='submit' class='btn btn-search'>Search</button>
</form>


    {% if mess %}
    <h5>{{ mess }}</h5>
    {% endif %}

    {% if l %}
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Name</th>
            <th>ID</th>
            <th>Department</th>
            <th>Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          {% for i in range(l) %}
          <tr>
            <td>{{ i+1 }}</td>
            <td>{{ names[i] }}</td>
            <td>{{ rolls[i] }}</td>
            <td>{{ departments[i] }}</td>
            <td>{{ dates[i] }}</td>
            <td>Registered</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    {% endif %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"></script>
</body>

</html>
