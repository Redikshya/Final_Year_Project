<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add User - Lockify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ------------------ BACKGROUND ------------------ */
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(
        135deg,
        rgba(155, 221, 255, 0.95),
        rgba(155, 221, 255, 0.7)
      );
      backdrop-filter: blur(8px);
    }

    /* ------------------ LAYOUT SPLIT ------------------ */
    .split-container {
      display: flex;
      width: 90%;
      max-width: 1100px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }

    /* ------------------ LEFT PANEL ------------------ */
    .left-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.5);
      padding: 40px;
      color: #000;
    }

    .left-panel h1.page-title a {
      text-decoration: none;
      color: #000;
    }

    .left-panel h1.page-title {
      font-size: 44px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .form-container {
      width: 80%;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .form-container h2 {
      font-weight: 700;
      margin-bottom: 25px;
      color: #000;
    }

    .form-control {
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 20px;
      padding: 12px 16px;
      border: 1px solid #ccc;
      text-align: center;
    }

    .btn-dark {
      background-color: #000 !important;
      color: #fff;
      border-radius: 12px;
      width: 100%;
      font-size: 18px;
      padding: 10px;
      border: none;
      transition: 0.3s;
    }

    .btn-dark:hover {
      background-color: #333 !important;
      transform: translateY(-2px);
    }

    .btn-homepage {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: bold;
      color: #000;
      background-color: #fff;
      border-radius: 10px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      transition: 0.3s;
    }

    .btn-homepage:hover {
      background-color: #e6e6e6;
      transform: translateY(-2px);
    }

    /* ------------------ RIGHT PANEL ------------------ */
    .right-panel {
      flex: 1;
      background: url("{{ url_for('static', filename='images/login.jpg') }}") center/cover no-repeat;
    }

    /* ------------------ RESPONSIVE ------------------ */
    @media (max-width: 992px) {
      .split-container {
        flex-direction: column;
        height: auto;
      }
      .right-panel {
        height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="split-container">
    <!-- Left Panel -->
    <div class="left-panel">
    

      <div class="form-container">
        <h2>Add New User</h2>
      <form action="/adduserbtn" method="POST" enctype="multipart/form-data">
  <input
    type="text"
    id="newusername"
    name="newusername"
    class="form-control"
    placeholder="Username"
    required
  />
  <input
    type="text"
    id="newuserid"
    name="newuserid"
    class="form-control"
    placeholder="User ID"
    required
  />
  
  <!-- Department Dropdown -->
  <select name="department" id="department" class="form-control" required>
    <option value="" disabled selected>Select Department</option>
    <option value="CS">CS</option>
    <option value="Biology">Biology</option>
    <option value="Physics">Physics</option>
  </select>

  <button type="submit" class="btn btn-dark">Submit</button>
</form>


        {% if mess %}
        <br>
        <h5 style="padding: 10px; color: #000;">{{ mess }}</h5>
        {% endif %}

        <a href="{{ url_for('dashboard') }}" class="btn-homepage">Go to Dashboard</a>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
